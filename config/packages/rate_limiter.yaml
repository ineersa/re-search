# Research submit throttling: per anonymous client fingerprint (IP + User-Agent).
# State is stored in a shared cache pool under /app/data so web + workers see the same counters.
framework:
    rate_limiter:
        research_submit:
            policy: 'sliding_window'
            limit: '%env(int:RESEARCH_SUBMIT_RATE_LIMIT)%'
            interval: '1 day'
            cache_pool: cache.research_rate_limiter
