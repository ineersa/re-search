# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    research.model: '%env(RESEARCH_MODEL)%'
    research.mercure_topic_base: '%env(DEFAULT_URI)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Symfony AI llama.cpp Platform (ai.platform tag for AI bundle discovery)
    app.llama_cpp.platform:
        class: Symfony\AI\Platform\Platform
        factory: ['App\Platform\LlamaCpp\PlatformFactory', 'create']
        arguments:
            $baseUrl: '%env(LLAMACPP_BASE_URL)%'
            $apiKey: '%env(LLAMACPP_API_KEY)%'
            $httpClient: '@research.llama_http_client'
        tags:
            - { name: ai.platform, platform: llama }

    Symfony\AI\Platform\Platform $llamaCppPlatform: '@app.llama_cpp.platform'

    app.generic.model_catalog:
        class: Symfony\AI\Platform\Bridge\Generic\ModelCatalog
        arguments:
            $models: []

    app.generic.platform:
        class: Symfony\AI\Platform\Platform
        factory: ['App\Platform\Generic\PlatformFactory', 'create']
        arguments:
            $baseUrl: '%env(GENERIC_BASE_URL)%'
            $apiKey: null
            $httpClient: '@http_client'
        tags:
            - { name: ai.platform, platform: generic }

    # Z.AI Platform
    app.zai.platform:
        class: Symfony\AI\Platform\Platform
        factory: ['App\Platform\Zai\PlatformFactory', 'create']
        arguments:
            $baseUrl: '%env(ZAI_BASE_URL)%'
            $apiKey: '%env(ZAI_API_KEY)%'
            $httpClient: '@http_client'
        tags:
            - { name: ai.platform, platform: zai }

    # OpenAI Platform
    app.openai.platform:
        class: Symfony\AI\Platform\Platform
        factory: ['Symfony\AI\Platform\Bridge\OpenAi\PlatformFactory', 'create']
        arguments:
            $apiKey: '%env(OPENAI_API_KEY)%'
            $httpClient: '@http_client'

    # Platform from ai.yaml; factory selects via AI_PLATFORM env (llama|zai|generic|openai)
    App\Research\Platform\ResearchPlatformFactory:
        arguments:
            $platforms: !service_locator
                llama: '@app.llama_cpp.platform'
                generic: '@app.generic.platform'
                zai: '@app.zai.platform'
                openai: '@app.openai.platform'
            $platformName: '%env(AI_PLATFORM)%'

    Symfony\AI\Platform\PlatformInterface: '@App\Research\Platform\ResearchPlatformFactory'

    # Research orchestration - Toolbox with web search tools
    Symfony\AI\Agent\Toolbox\Toolbox:
        arguments:
            $tools: ['@App\Research\Tool\WebSearchTool']

    Symfony\AI\Agent\Toolbox\ToolboxInterface: '@Symfony\AI\Agent\Toolbox\Toolbox'

    App\Research\ResearchTaskPromptBuilder:
        arguments:
            $platform: '@Symfony\AI\Platform\PlatformInterface'
            $model: '%research.model%'

    # Research Mercure - topic factory and event publisher
    App\Research\Mercure\ResearchTopicFactory:
        arguments:
            $baseUrl: '%research.mercure_topic_base%'

    # Research domain - interface bindings
    App\Research\Event\EventPublisherInterface: '@App\Research\Event\MercureEventPublisher'

    # MCP web search client - stateful client for websearch server
    App\Research\Mcp\McpWebSearchClient:
        arguments:
            $httpClient: '@http_client'
            $baseUrl: '%env(MCP_WEBSEARCH_URL)%'

    App\Platform\Contract\Normalizer\Message\AssistantMessageNormalizer:
        tags:
            - { name: serializer.normalizer, priority: 1000 }

    cache.research_rate_limiter:
        class: Symfony\Component\Cache\Adapter\FilesystemAdapter
        public: true
        arguments:
            $namespace: 'research_rate_limiter'
            $defaultLifetime: 0
            $directory: '%kernel.project_dir%/data/cache/rate_limiter'
